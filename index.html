<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clever</title>
    <style>
      @font-face {
        font-family: EurostileBoldExtended;
        src: url(EurostileBoldExtended.otf);
      }

      ::selection {
        background: #FAF9F6;
        color: #D2042D;
      }

      body {
        background: #d2042d;
        color: #FAF9F6;
        font-family: EurostileBoldExtended, sans-serif;
        font-weight: bold;
        font-size: 5rem;
        margin: 0;
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      #content-frame {
        display: none;
        width: 100%;
        height: 100%;
        border: none;
      }

      .unlocked #hello-text { display: none; }
      .unlocked #content-frame { display: block; }
    </style>
</head>
<body>

    <div id="blank"></div>
    <iframe id="content-frame" src="about:blank"></iframe>

    <script>
        // Map your secret codes to their target URLs
        const secretCodes = {
            "seahawks": "real-site.html",
            "antimatter": "antimatter.html",
            "gn": "gn.html"
        };
        
        let inputBuffer = "";
        // Find the longest code so we know how big to make the input buffer
        const maxBufferLength = Math.max(...Object.keys(secretCodes).map(code => code.length));

        function unlockSite(targetUrl) {
            document.body.classList.add('unlocked');
            document.getElementById('content-frame').src = targetUrl;
            // Save the specific URL to the cookie instead of just "true"
            document.cookie = "access_granted=" + targetUrl + "; max-age=" + (60 * 60 * 24 * 30) + "; path=/";
        }

        // Check if a cookie already exists to keep the site unlocked on reload
        const cookie = document.cookie.split(';').find((item) => item.trim().startsWith('access_granted='));
        if (cookie) {
            let savedUrl = cookie.split('=')[1].trim();
            // Fallback just in case the old cookie style ("true") is still in the browser
            if (savedUrl === "true") savedUrl = "real-site.html"; 
            unlockSite(savedUrl);
        }

        window.addEventListener('keydown', (e) => {
            // Only track single character keystrokes (ignores Shift, Ctrl, etc.)
            if (e.key.length === 1) {
                inputBuffer += e.key;
                
                // Keep the buffer strictly to the length of our longest secret code
                if (inputBuffer.length > maxBufferLength) {
                    inputBuffer = inputBuffer.substring(inputBuffer.length - maxBufferLength);
                }
                
                // Check if the current buffer ends with any of our secret codes
                for (const code in secretCodes) {
                    if (inputBuffer.endsWith(code)) {
                        unlockSite(secretCodes[code]);
                        inputBuffer = ""; // Reset buffer after a successful unlock
                        break; 
                    }
                }
            }
        });
    </script>
</body>
</html>
